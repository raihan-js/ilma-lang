name: Validate build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-check:
    name: Validate Cloudflare Pages build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install --break-system-packages requests 2>/dev/null || true

      - name: Run build script
        run: bash build.sh

      - name: Verify critical files exist
        run: |
          echo "Checking build output..."
          [ -f website/index.html ]             && echo "OK: index.html"       || (echo "MISSING: index.html" && exit 1)
          [ -f website/install.sh ]             && echo "OK: install.sh"       || (echo "MISSING: install.sh" && exit 1)
          [ -f website/packages/registry.json ] && echo "OK: registry.json"    || (echo "MISSING: registry.json" && exit 1)
          [ -f website/ilma-version.json ]      && echo "OK: version.json"     || (echo "MISSING: version.json" && exit 1)
          echo "Build validation passed."

      - name: Validate registry JSON
        run: |
          python3 -c "
          import json, sys
          with open('website/packages/registry.json') as f:
              reg = json.load(f)
          pkgs = reg.get('packages', [])
          print(f'Registry has {len(pkgs)} packages')
          for p in pkgs:
              assert 'name' in p, f'Package missing name: {p}'
              assert 'url'  in p, f'Package missing url: {p}'
          print('Registry JSON valid')
          "

name: Tests

on: [push, pull_request]

jobs:
  # ── Compiler tests ───────────────────────────────────────────
  compiler-tests:
    name: Compiler tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC
        run: sudo apt-get update -qq && sudo apt-get install -y gcc make

      - name: Build ILMA compiler
        run: make all

      - name: Run test suite
        run: make test

  # ── VS Code extension ────────────────────────────────────────
  vscode-extension:
    name: VS Code extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm install

      - name: Compile extension
        working-directory: vscode-extension
        run: npm run compile

      - name: Validate JSON files
        working-directory: vscode-extension
        run: |
          node -e "JSON.parse(require('fs').readFileSync('syntaxes/ilma.tmLanguage.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('language-configuration.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('snippets/ilma.json', 'utf8'))"
          echo "All JSON files valid"

  # ── Website validation ───────────────────────────────────────
  website-validation:
    name: Check style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate HTML structure
        working-directory: website
        run: |
          for f in index.html install.html docs.html; do
            echo "Checking $f..."
            node -e "
              const html = require('fs').readFileSync('$f', 'utf8');
              if (!html.includes('<!DOCTYPE html>')) { console.error('Missing DOCTYPE in $f'); process.exit(1); }
              if (!html.includes('</html>')) { console.error('Missing closing html tag in $f'); process.exit(1); }
              console.log('  $f OK');
            "
          done
          echo "All HTML files valid"

      - name: Verify CSS and JS exist
        working-directory: website
        run: |
          [ -f css/main.css ]   && echo "main.css OK"   || (echo "MISSING: css/main.css"   && exit 1)
          [ -f js/main.js ]     && echo "main.js OK"    || (echo "MISSING: js/main.js"     && exit 1)
          [ -f js/playground.js ] && echo "playground.js OK" || (echo "MISSING: js/playground.js" && exit 1)

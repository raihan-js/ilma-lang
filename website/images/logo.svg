<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 48" width="140" height="48">
  <defs>
    <linearGradient id="alefGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7F77DD"/>
      <stop offset="100%" style="stop-color:#3C3489"/>
    </linearGradient>
  </defs>
  <!-- Alef mark: calligraphic vertical stroke with curved base -->
  <g transform="translate(4, 4)">
    <!-- Main stroke of the Alef -->
    <path d="M 20 3 C 21 3 23 5 22 10 C 21 15 20 20 19 25 C 18 30 17 33 16 36"
          stroke="url(#alefGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Base sweep (foot of the Alef) -->
    <path d="M 9 34 C 12 32 16 33 20 35 C 24 37 27 36 28 34"
          stroke="url(#alefGrad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Top flourish (the kink/angle at top of Alef) -->
    <path d="M 20 3 C 19 1 17 1 16 3"
          stroke="url(#alefGrad)" stroke-width="2" stroke-linecap="round" fill="none"/>
    <!-- Small diacritic dot -->
    <circle cx="22" cy="8" r="1.5" fill="#7F77DD"/>
  </g>
  <!-- ILMA wordmark -->
  <text x="50" y="34"
        font-family="Inter, Arial, sans-serif"
        font-size="28"
        font-weight="700"
        fill="#1a1a2e"
        letter-spacing="1">ILMA</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#534AB7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded rectangle background -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bg)" />
  <!-- Subtle inner shadow -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" />
  <!-- ILMA text -->
  <text x="128" y="148" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="4">ILMA</text>
  <!-- Tagline -->
  <text x="128" y="188" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="6">LANGUAGE</text>
</svg>
